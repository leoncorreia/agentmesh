# `databases:` in Render Blueprints is PostgreSQL only — do not use it for Redis.
# Use `type: keyvalue` under `services` for Redis®-compatible Key Value.

services:
  # Real Redis (Render Key Value). connectionString is redis:// on the private network.
  - type: keyvalue
    name: agentmesh-kv
    plan: free
    region: oregon
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []

  - type: web
    name: core
    runtime: node
    plan: starter
    autoDeploy: true
    healthCheckPath: /health
    buildCommand: npm ci --include=dev && npm run build -w @agentmesh/core
    startCommand: node packages/core/dist/main.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: AWS_REGION
        value: us-east-1
      - key: BEDROCK_MODEL_ID
        value: anthropic.claude-3-5-sonnet-20241022-v2:0
      - key: REDIS_URL
        fromService:
          name: agentmesh-kv
          type: keyvalue
          property: connectionString
      - key: REDIS_MCP_URL
        fromService:
          name: agentmesh-kv
          type: keyvalue
          property: connectionString
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: TINYFISH_API_KEY
        sync: false
      - key: GMI_API_BASE
        sync: false
      - key: GMI_API_KEY
        sync: false
      - key: GMI_MODEL
        sync: false
      - key: VAPI_API_KEY
        sync: false
      - key: VAPI_PHONE_NUMBER_ID
        sync: false
      - key: VAPI_ASSISTANT_ID
        sync: false
      - key: VAPI_WEBHOOK_URL
        sync: false
      - key: GHOST_API_URL
        sync: false
      - key: GHOST_CONTENT_API_KEY
        sync: false
      - key: NEXLA_API_URL
        sync: false
      - key: NEXLA_API_KEY
        sync: false
      - key: NEXLA_FLOW_ID
        sync: false
      - key: AUTONOMY_ENABLED
        value: "true"
      - key: AUTONOMY_INTERVAL_SECONDS
        value: "180"
      - key: AUTONOMY_TASK_TIMEOUT_MS
        value: "300000"
      - key: AUTONOMY_SOURCES
        sync: false
      - key: AUTONOMY_BRIEFING_PHONE
        sync: false
      - key: AUTONOMY_MONETIZATION_AMOUNT_USD
        value: "25"
      - key: AGENT_MEMORY_API_URL
        sync: false
      - key: AGENT_MEMORY_API_KEY
        sync: false
      - key: AGENT_MEMORY_USER_ID
        value: agentmesh
      - key: AGENT_MEMORY_SESSION_ID
        value: autonomy
      - key: AGENT_MEMORY_LIMIT
        value: "5"
      - key: X402_ENDPOINT
        sync: false
      - key: X402_API_KEY
        sync: false
      - key: MPP_ENDPOINT
        sync: false
      - key: MPP_API_KEY
        sync: false
      - key: CDP_ENDPOINT
        sync: false
      - key: CDP_API_KEY
        sync: false
      - key: AGENTIC_MARKET_ENDPOINT
        sync: false
      - key: AGENTIC_MARKET_API_KEY
        sync: false

  - type: pserv
    name: agent-research
    runtime: node
    plan: starter
    autoDeploy: true
    buildCommand: npm ci --include=dev && npm run build -w @agentmesh/core && npm run build -w @agentmesh/agent-base && npm run build -w @agentmesh/agent-research
    startCommand: node packages/agents/research/dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: CORE_HOSTPORT
        fromService:
          type: web
          name: core
          property: hostport
      - key: AGENT_PUBLIC_HOST
        value: agent-research
      - key: AGENT_ID
        value: render-research
      - key: AWS_REGION
        value: us-east-1
      - key: BEDROCK_MODEL_ID
        value: anthropic.claude-3-5-sonnet-20241022-v2:0
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: TINYFISH_API_KEY
        sync: false
      - key: GMI_API_BASE
        sync: false
      - key: GMI_API_KEY
        sync: false
      - key: GMI_MODEL
        sync: false

  - type: web
    name: dashboard
    runtime: static
    rootDir: packages/dashboard
    buildCommand: npm run build
    staticPublishPath: dist
    pullRequestPreviewsEnabled: true
    envVars:
      - key: VITE_CORE_URL
        sync: false
      - key: VITE_CORE_WS_URL
        sync: false
      - key: VITE_VOICE_URL
        sync: false
